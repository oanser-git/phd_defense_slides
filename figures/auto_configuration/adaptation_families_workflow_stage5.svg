<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900">
  <defs>
    <style>
      .nodelabel { font: 700 28px 'DejaVu Sans', Arial, sans-serif; fill: #2c3e43; }
      .famlabel { font: 700 24px 'DejaVu Sans', Arial, sans-serif; fill: #2c3e43; }
      .small { font: 700 24px 'DejaVu Sans', Arial, sans-serif; fill: #5f6870; }
      .tiny { font: 400 20px 'DejaVu Sans', Arial, sans-serif; fill: #314047; }
      .legendtitle { font: 700 30px 'DejaVu Sans', Arial, sans-serif; }
      .legenddesc { font: 400 30px 'DejaVu Sans', Arial, sans-serif; fill: #314047; }
      .family { font: 700 22px 'DejaVu Sans', Arial, sans-serif; fill: white; }
      .arrow { stroke: #55636c; stroke-width: 4.2; fill: none; stroke-linecap: round; stroke-linejoin: round; }
      .arrowThin { stroke: #55636c; stroke-width: 3.1; fill: none; stroke-linecap: round; stroke-linejoin: round; }
      .dashed { stroke-dasharray: 8 7; }
    </style>
    <marker id="arrowhead" markerWidth="8" markerHeight="8" refX="6.8" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#55636c"/>
    </marker>
  </defs>
  <rect x="860.0" y="250" width="330.0" height="210" rx="26" ry="26" fill="none" stroke="#b8bfc5" stroke-width="2.4" stroke-dasharray="8 7"/><text x="1025.0" y="286" text-anchor="middle" class="small">Anomaly Detection NIDS</text><rect x="40.0" y="320.0" width="240.0" height="96.0" rx="24" ry="24" fill="#ffffff" stroke="#5b6770" stroke-width="2.8"/><text x="160.0" y="355.0" text-anchor="middle" class="nodelabel"><tspan x="160.0" dy="0">Incoming</tspan><tspan x="160.0" dy="34">traffic</tspan></text><rect x="400.0" y="320.0" width="360.0" height="96.0" rx="24" ry="24" fill="#ffffff" stroke="#5b6770" stroke-width="2.8"/><text x="580.0" y="355.0" text-anchor="middle" class="nodelabel"><tspan x="580.0" dy="0">Deployed</tspan><tspan x="580.0" dy="34">ML-based NIDS</tspan></text><rect x="900.0" y="320.0" width="210.0" height="96.0" rx="24" ry="24" fill="#ffffff" stroke="#5b6770" stroke-width="2.8"/><text x="1005.0" y="372.0" text-anchor="middle" class="nodelabel"><tspan x="1005.0" dy="0">Threshold</tspan></text><rect x="1260.0" y="320.0" width="240.0" height="96.0" rx="24" ry="24" fill="#ffffff" stroke="#5b6770" stroke-width="2.8"/><text x="1380.0" y="372.0" text-anchor="middle" class="nodelabel"><tspan x="1380.0" dy="0">Alerts</tspan></text><line x1="280.0" y1="368.0" x2="400.0" y2="368.0" class="arrow" marker-end="url(#arrowhead)"/><line x1="760.0" y1="368.0" x2="900.0" y2="368.0" class="arrow" marker-end="url(#arrowhead)"/><line x1="1110.0" y1="368.0" x2="1260.0" y2="368.0" class="arrow" marker-end="url(#arrowhead)"/><rect x="55.0" y="78.0" width="260.0" height="98.0" rx="22" ry="22" fill="#e6f0ff" stroke="#3B82F6" stroke-width="3.0"/><text x="185.0" y="116.0" text-anchor="middle" class="famlabel"><tspan x="185.0" dy="0">Drift / shift</tspan><tspan x="185.0" dy="30">monitor</tspan></text><circle cx="287.0" cy="60.0" r="20" fill="#3B82F6"/><text x="287.0" y="68.0" text-anchor="middle" class="family">D</text><path d="M 185.0,176.0 C 175.0,246.0 150.0,260.0 160.0,320.0" class="arrowThin dashed" marker-end="url(#arrowhead)"/><path d="M 315.0,116.0 C 400.0,166.0 430.0,242.0 430.0,320.0" class="arrowThin dashed" marker-end="url(#arrowhead)"/><rect x="365.0" y="78.0" width="250.0" height="98.0" rx="22" ry="22" fill="#f0e9ff" stroke="#7C3AED" stroke-width="3.0"/><text x="490.0" y="116.0" text-anchor="middle" class="famlabel"><tspan x="490.0" dy="0">Transfer /</tspan><tspan x="490.0" dy="30">domain adap.</tspan></text><circle cx="587.0" cy="60.0" r="20" fill="#7C3AED"/><text x="587.0" y="68.0" text-anchor="middle" class="family">T</text><path d="M 490.0,176.0 C 500.0,246.0 480.0,250.0 480.0,320.0" class="arrowThin dashed" marker-end="url(#arrowhead)"/><rect x="665.0" y="78.0" width="250.0" height="98.0" rx="22" ry="22" fill="#fde7ff" stroke="#C026D3" stroke-width="3.0"/><text x="790.0" y="131.0" text-anchor="middle" class="famlabel"><tspan x="790.0" dy="0">Meta-learner</tspan></text><circle cx="887.0" cy="60.0" r="20" fill="#C026D3"/><text x="887.0" y="68.0" text-anchor="middle" class="family">M</text><path d="M 790.0,176.0 C 790.0,256.0 580.0,250.0 580.0,320.0" class="arrowThin dashed" marker-end="url(#arrowhead)"/><rect x="965.0" y="78.0" width="300.0" height="98.0" rx="22" ry="22" fill="#e5f7f5" stroke="#0F766E" stroke-width="3.0"/><text x="1115.0" y="116.0" text-anchor="middle" class="famlabel"><tspan x="1115.0" dy="0">Online /</tspan><tspan x="1115.0" dy="30">continual update</tspan></text><circle cx="1237.0" cy="60.0" r="20" fill="#0F766E"/><text x="1237.0" y="68.0" text-anchor="middle" class="family">O</text><path d="M 1115.0,176.0 C 1097.0,242 720.0,238 710.0,320.0" class="arrowThin dashed" marker-end="url(#arrowhead)"/><rect x="1010.0" y="475.0" width="310.0" height="104.0" rx="22" ry="22" fill="#fff1df" stroke="#D97706" stroke-width="3.0"/><text x="1165.0" y="516.0" text-anchor="middle" class="famlabel"><tspan x="1165.0" dy="0">Few labels /</tspan><tspan x="1165.0" dy="30">pseudo-labels</tspan></text><circle cx="1292.0" cy="457.0" r="20" fill="#D97706"/><text x="1292.0" y="465.0" text-anchor="middle" class="family">A</text><path d="M 1380.0,416.0 C 1350.0,442.0 1264.2,445.0 1233.2,475.0" class="arrowThin dashed" marker-end="url(#arrowhead)"/><path d="M 1010.0,527.0 C 910.0,547.0 620.0,526.0 580.0,416.0" class="arrowThin dashed" marker-end="url(#arrowhead)"/><rect x="1305.0" y="78.0" width="250.0" height="98.0" rx="22" ry="22" fill="#eef0f3" stroke="#6B7280" stroke-width="3.0"/><text x="1430.0" y="116.0" text-anchor="middle" class="famlabel"><tspan x="1430.0" dy="0">Threshold</tspan><tspan x="1430.0" dy="30">calibration</tspan></text><circle cx="1527.0" cy="60.0" r="20" fill="#6B7280"/><text x="1527.0" y="68.0" text-anchor="middle" class="family">C</text><path d="M 1430.0,176.0 C 1436.0,246 1230.0,240 1055.4,320.0" class="arrowThin dashed" marker-end="url(#arrowhead)"/><g opacity="1.0"><circle cx="90" cy="620" r="16" fill="#3B82F6"/><text x="90" y="628" text-anchor="middle" class="family">D</text><text x="124" y="626" class="legendtitle" fill="#3B82F6">Drift detection</text><text x="124" y="654" class="legenddesc">monitor change in traffic</text><text x="124" y="686" class="legenddesc">or detector scores</text><text x="124" y="718" class="tiny">CADE, OWAD, TRANSCEND</text></g><g opacity="1.0"><circle cx="570" cy="620" r="16" fill="#7C3AED"/><text x="570" y="628" text-anchor="middle" class="family">T</text><text x="604" y="626" class="legendtitle" fill="#7C3AED">Transfer / domain adap.</text><text x="604" y="654" class="legenddesc">reuse knowledge from</text><text x="604" y="686" class="legenddesc">another context</text><text x="604" y="718" class="tiny">ADA, NAEF, DI-NIDS</text></g><g opacity="1.0"><circle cx="1050" cy="620" r="16" fill="#C026D3"/><text x="1050" y="628" text-anchor="middle" class="family">M</text><text x="1084" y="626" class="legendtitle" fill="#C026D3">Meta-learning</text><text x="1084" y="654" class="legenddesc">learn how to adapt quickly</text><text x="1084" y="686" class="legenddesc">from prior tasks</text><text x="1084" y="718" class="tiny">FC-Net, PTN-IDS, RETSINA</text></g><g opacity="1.0"><circle cx="90" cy="780" r="16" fill="#0F766E"/><text x="90" y="788" text-anchor="middle" class="family">O</text><text x="124" y="786" class="legendtitle" fill="#0F766E">Online / continual learning</text><text x="124" y="814" class="legenddesc">update model weights over</text><text x="124" y="846" class="legenddesc">time</text><text x="124" y="878" class="tiny">AOC-IDS, ENIDrift, ReCDA</text></g><g opacity="1.0"><circle cx="570" cy="780" r="16" fill="#D97706"/><text x="570" y="788" text-anchor="middle" class="family">A</text><text x="604" y="786" class="legendtitle" fill="#D97706">Active / semi-supervised</text><text x="604" y="814" class="legenddesc">use few labels or pseudo-</text><text x="604" y="846" class="legenddesc">labels</text><text x="604" y="878" class="tiny">Active-SVDD, HITL-IDS, METALS</text></g><g opacity="1.0"><circle cx="1050" cy="780" r="16" fill="#6B7280"/><text x="1050" y="788" text-anchor="middle" class="family">C</text><text x="1084" y="786" class="legendtitle" fill="#6B7280">Threshold calibration</text><text x="1084" y="814" class="legenddesc">adjust alert cutoff after</text><text x="1084" y="846" class="legenddesc">training</text><text x="1084" y="878" class="tiny">Bridges, Hundman, MAGPIE</text></g>
</svg>
